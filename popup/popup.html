<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header {
      background: #2e4361;
      color: #fff;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 14px;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid #eee;
    }
    .tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s;
    }
    .tab.active { color: #2e4361; border-bottom-color: #2e4361; }
    .panel { display: none; padding: 14px 16px; }
    .panel.active { display: block; }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .row:last-of-type { border-bottom: none; }
    .label { color: #888; flex-shrink: 0; }
    .value { font-weight: 500; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.on    { background: #e6f4ea; color: #1e7e34; }
    .badge.off   { background: #fce8e8; color: #c0392b; }
    .badge.pause { background: #fff3cd; color: #856404; }
    select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    .btn {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-login  { background: #4285f4; color: #fff; }
    .btn-logout { background: #f0f0f0; color: #555; }
    /* 차단 탭 */
    .block-empty { text-align: center; color: #aaa; padding: 20px 0; font-size: 12px; }
    .block-list { list-style: none; }
    .block-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
    }
    .block-item:last-of-type { border-bottom: none; }
    .block-info { flex: 1; min-width: 0; }
    .block-nick { font-weight: 600; }
    .block-memo { color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .block-date { color: #bbb; font-size: 11px; margin-top: 1px; }
    .btn-remove {
      background: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 2px 7px;
      cursor: pointer;
      font-size: 11px;
      color: #aaa;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .btn-remove:hover { border-color: #e84a5f; color: #e84a5f; }
    /* 토글 */
    .toggle { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #ccc; border-radius: 18px; transition: .25s;
    }
    .toggle .slider:before {
      content: ''; position: absolute;
      width: 12px; height: 12px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: .25s;
    }
    .toggle input:checked + .slider { background: #2e4361; }
    .toggle input:checked + .slider:before { transform: translateX(16px); }
  </style>
</head>
<body>
  <div class="header">dogdrip-helper</div>
  <div class="tabs">
    <div class="tab active" data-panel="sync">동기화</div>
    <div class="tab" data-panel="blocks">차단</div>
  </div>

  <!-- 동기화 탭 -->
  <div class="panel active" id="panel-sync">
    <div class="row">
      <span class="label">상태</span>
      <span id="status" class="badge off">로그인 필요</span>
    </div>
    <div class="row" id="row-count" hidden>
      <span class="label">읽은 게시물</span>
      <span id="count" class="value">-</span>
    </div>
    <div class="row" id="row-sync" hidden>
      <span class="label">동기화</span>
      <span id="last-sync" class="value">-</span>
    </div>
    <div class="row" id="row-sync-toggle" hidden>
      <span class="label">Drive 동기화</span>
      <label class="toggle">
        <input type="checkbox" id="sync-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="row" id="row-retention" hidden>
      <span class="label">유지 기간</span>
      <select id="retention">
        <option value="7">7일</option>
        <option value="14">14일</option>
        <option value="30">30일</option>
        <option value="90">90일</option>
        <option value="0">제한없음</option>
      </select>
    </div>
    <button id="btn-login"  class="btn btn-login">Google로 로그인</button>
    <button id="btn-logout" class="btn btn-logout" hidden>로그아웃</button>
  </div>

  <!-- 차단 탭 -->
  <div class="panel" id="panel-blocks">
    <div id="block-empty" class="block-empty" hidden>차단된 회원이 없습니다.</div>
    <ul id="block-list" class="block-list"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
